name: FIFA Match Automation Bot

on:
  schedule:
    # Run every 6 hours to ensure we catch all matches across the day
    # GitHub Actions will kill jobs after 6 hours anyway
    - cron: '0 */6 * * *'

  # Allow manual triggering from the GitHub Actions UI
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    # 6 hours = 360 mins (GitHub max limit for standard hosted runners)
    timeout-minutes: 360 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Cloud Dependencies
        run: npm i firebase-admin dotenv

      - name: Run FIFA Live Monitor Engine
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_OVERLAYCHAT_FOOTBALL }}
          FIREBASE_ROOM: fifa
          # Optional: Use if default inference fails
          # FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
        run: node automation/fifa-monitor.js
